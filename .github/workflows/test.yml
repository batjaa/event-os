name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_DIALECT: sqlite
  NODE_VERSION: 24

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Setup SQLite
        run: |
          npx drizzle-kit push
          npx tsx src/db/seed.ts

      - name: Run unit & integration tests
        run: npx vitest run tests/unit tests/integration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  e2e-api:
    name: API E2E Tests
    needs: [unit-and-integration]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Setup SQLite
        run: |
          npx drizzle-kit push
          npx tsx src/db/seed.ts

      - name: Start server and run e2e tests
        run: |
          AUTH_SECRET=ci-test-secret SERVICE_TOKEN=ci-test-token npm run dev &
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:3000 && break; sleep 1; done
          curl -sf http://localhost:3000 > /dev/null || { echo "Server failed to start"; exit 1; }
          SERVICE_TOKEN=ci-test-token npx vitest run tests/e2e
        env:
          PORT: 3000
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  e2e-browser:
    name: Playwright E2E Tests
    needs: [unit-and-integration]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Setup SQLite
        run: |
          npx drizzle-kit push
          npx tsx src/db/seed.ts

      - name: Run Playwright tests
        run: npx playwright test
        env:
          AUTH_SECRET: ci-test-secret
          SERVICE_TOKEN: ci-test-token

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
